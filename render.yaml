services:
  - type: web
    name: flowboard-portal
    env: python
    buildCommand: pip install -r requirements.txt
    # We call gunicorn using the gevent worker class to run our SocketIO instance smoothly
    startCommand: gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: SECRET_KEY
        generateValue: true