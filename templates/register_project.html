<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Register Project</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='dashboard.css') }}">

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* BODY */

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;

    background:
    linear-gradient(
        rgba(15,23,42,0.85),
        rgba(15,23,42,0.85)
    ),

    url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop')
    no-repeat center center/cover;

    overflow-x:hidden;

}

/* FORM CONTAINER */

.form-box{

    width:100%;

    max-width:600px;

    background:rgba(30,41,59,0.96);

    padding:35px;

    border-radius:25px;

    box-shadow:0px 0px 25px rgba(0,0,0,0.5);

    backdrop-filter:blur(10px);

    animation:fadeIn 1s ease;

}

/* HEADING */

.form-box h2{

    text-align:center;

    margin-bottom:25px;

    color:#38bdf8;

    font-size:32px;

}

/* INPUTS */

input,
textarea{

    width:100%;

    padding:15px;

    margin-top:15px;

    border:none;

    border-radius:12px;

    background:#0f172a;

    color:white;

    font-size:16px;

    outline:none;

    transition:0.3s;

}

/* INPUT FOCUS */

input:focus,
textarea:focus{

    border:2px solid #38bdf8;

    transform:scale(1.01);

}

/* TEXTAREA */

textarea{

    min-height:180px;

    resize:none;

}

/* DATE INPUT */

input[type="date"]{

    color:white;

}

/* BUTTON */

button{

    width:100%;

    padding:15px;

    margin-top:25px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        to right,
        #2563eb,
        #7c3aed
    );

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;

}

/* BUTTON HOVER */

button:hover{

    transform:translateY(-3px);

    box-shadow:0px 6px 20px rgba(37,99,235,0.4);

}

/* ANIMATION */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }

}

/* TABLET VIEW */

@media(max-width:992px){

    .form-box{

        max-width:650px;

        padding:30px;

    }

}

/* MOBILE VIEW */

@media(max-width:768px){

    body{

        padding:15px;

    }

    .form-box{

        width:100%;

        padding:25px;

        border-radius:20px;

    }

    .form-box h2{

        font-size:26px;

    }

    input,
    textarea{

        padding:13px;

        font-size:15px;

    }

    button{

        padding:14px;

        font-size:16px;

    }

}

/* SMALL MOBILE */

@media(max-width:480px){

    .form-box{

        padding:20px;

    }

    .form-box h2{

        font-size:22px;

    }

    textarea{

        min-height:140px;

    }

}

</style>

</head>

<body>

<div class="form-box">

<h2>
<i class="fa-solid fa-folder-plus"></i>
Register Project
</h2>

<form action="/submit_project"
      method="POST">

<input
       type="text"
       name="project"
       placeholder="Project Name"
       required>

<textarea
          name="description"
          placeholder="Project Description"
          required></textarea>

<input
       type="date"
       name="deadline"
       required>

<button type="submit">

<i class="fa-solid fa-paper-plane"></i>

Submit Project

</button>

</form>

</div>

</body>

</html>
