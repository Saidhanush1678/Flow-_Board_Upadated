<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Assign Project</title>

<style>

body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    color:#38bdf8;
    margin-bottom:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    padding:12px;
    text-align:left;
    border-bottom:1px solid #334155;
}

th{
    background:#334155;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:linear-gradient(to right,#2563eb,#7c3aed);
    color:white;
}

button:hover{
    opacity:0.8;
}

.badge{
    background:#22c55e;
    padding:5px 10px;
    border-radius:8px;
    font-size:12px;
}

</style>

</head>

<body>

<div class="container">

<h1>Assign Project: {{ project_name }}</h1>

<div class="card">

<h2>Available Team Leaders</h2>

<table>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Phone</th>
<th>Experience</th>
<th>Action</th>
</tr>

{% for leader in leaders %}
<tr>

<td>{{ leader.id }}</td>
<td>{{ leader.name }}</td>
<td>{{ leader.email }}</td>
<td>{{ leader.department }}</td>
<td>{{ leader.phone }}</td>
<td>{{ leader.experience }} yrs</td>

<td>
<a href="/assign_to_leader/{{ project_name }}/{{ leader.id }}">
<button>Assign</button>
</a>
</td>

</tr>
{% endfor %}

</table>

</div>

</div>

</body>

</html>
